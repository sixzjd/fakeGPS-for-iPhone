<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FakeGPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", sans-serif; background: #1a1a2e; color: #eee; }
  #map { width: 100%; height: 100vh; }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #00c853; color: #fff; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s;
    z-index: 2000; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #ff4757; }
  .search-bar {
    position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
    display: flex; gap: 8px;
  }
  .search-bar input {
    width: 300px; padding: 10px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(26,26,46,0.95); color: #eee; font-size: 14px;
    outline: none; backdrop-filter: blur(10px);
  }
  .search-bar input:focus { border-color: #00d4ff; }
  .search-bar input::placeholder { color: rgba(255,255,255,0.4); }
  .search-bar button {
    padding: 10px 16px; border-radius: 10px; border: none;
    background: #00d4ff; color: #1a1a2e; font-weight: 600; cursor: pointer;
  }
  .info-bar {
    position: fixed; bottom: 20px; left: 20px; z-index: 1000;
    background: rgba(26,26,46,0.95); border-radius: 12px; padding: 14px 18px;
    font-size: 13px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
    min-width: 260px;
  }
  .info-bar .coords { color: #00d4ff; font-family: monospace; font-size: 14px; margin-bottom: 8px; }
  .info-bar .hint { color: #888; font-size: 12px; }
  .popup-btns {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .popup-btns button {
    flex: 1; padding: 8px 12px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .popup-btns .btn-set { background: #00d4ff; color: #1a1a2e; }
  .popup-btns .btn-copy { background: rgba(255,255,255,0.15); color: #eee; }
  .popup-btns .btn-restore { background: #ff4757; color: #fff; }
  .popup-btns button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="map"></div>

<div class="search-bar" style="flex-direction:column;align-items:stretch">
  <div style="display:flex;gap:8px">
    <input type="text" id="search" placeholder="Search places or enter coordinates..." autocomplete="off" />
    <button onclick="doSearch()">Search</button>
  </div>
  <div id="searchDropdown" style="display:none;background:rgba(26,26,46,0.98);border-radius:10px;margin-top:4px;max-height:300px;overflow-y:auto;border:1px solid rgba(255,255,255,0.1)"></div>
</div>

<div id="amapKeyBar" style="position:fixed;top:55px;left:50%;transform:translateX(-50%);z-index:1000;display:none">
  <div style="background:rgba(26,26,46,0.95);border-radius:10px;padding:10px 14px;display:flex;gap:8px;align-items:center;border:1px solid rgba(255,255,255,0.1)">
    <span style="font-size:12px;color:#aaa">AMap Key:</span>
    <input id="amapKeyInput" type="text" placeholder="Enter AMap REST API Key" style="width:220px;padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#eee;font-size:12px;outline:none"/>
    <button onclick="saveAmapKey()" style="padding:6px 12px;border-radius:6px;border:none;background:#00d4ff;color:#1a1a2e;font-size:12px;cursor:pointer">Save</button>
    <button onclick="document.getElementById('amapKeyBar').style.display='none'" style="padding:6px 10px;border-radius:6px;border:none;background:rgba(255,255,255,0.15);color:#eee;font-size:12px;cursor:pointer">Close</button>
  </div>
</div>

<div class="info-bar">
  <div class="coords" id="coords">Click map to select</div>
  <div class="popup-btns" id="actionBtns" style="display:none">
    <button class="btn-set" onclick="applyLocation()">Set Location</button>
    <button class="btn-copy" onclick="copyCoords()">Copy</button>
  </div>
  <div class="popup-btns">
    <button class="btn-restore" onclick="restoreLocation()">Restore Real Location</button>
  </div>
  <div class="hint" id="hint">-</div>
</div>

<div class="toast" id="toast"></div>

<script>
var selectedLat = null, selectedLng = null, marker = null;
var bridge = null;
var _lastSetTitle = '';

// Init map
var map = L.map('map', { zoomControl: true }).setView([39.9087, 116.3975], 13);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: ['1','2','3','4'], attribution: '&copy; Amap'
}).addTo(map);

// GCJ-02 -> WGS-84
function gcj02ToWgs84(lat, lng) {
  var a=6378245.0,ee=0.00669342162296594323;
  function tl(x,y){var r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(y*Math.PI)+40*Math.sin(y/3*Math.PI))*2/3;r+=(160*Math.sin(y/12*Math.PI)+320*Math.sin(y*Math.PI/30))*2/3;return r;}
  function tg(x,y){var r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(x*Math.PI)+40*Math.sin(x/3*Math.PI))*2/3;r+=(150*Math.sin(x/12*Math.PI)+300*Math.sin(x/30*Math.PI))*2/3;return r;}
  var dlat=tl(lng-105,lat-35),dlng=tg(lng-105,lat-35);
  var rl=lat/180*Math.PI,mg=Math.sin(rl);mg=1-ee*mg*mg;var sq=Math.sqrt(mg);
  dlat=(dlat*180)/((a*(1-ee))/(mg*sq)*Math.PI);
  dlng=(dlng*180)/(a/sq*Math.cos(rl)*Math.PI);
  return [parseFloat((lat*2-(lat+dlat)).toFixed(6)),parseFloat((lng*2-(lng+dlng)).toFixed(6))];
}

function selectPoint(lat, lng) {
  var result = gcj02ToWgs84(lat, lng);
  selectedLat = result[0]; selectedLng = result[1];
  document.getElementById('coords').textContent = selectedLat + ', ' + selectedLng;
  document.getElementById('actionBtns').style.display = 'flex';
  document.getElementById('hint').textContent = 'Click "Set Location" to apply';
  // Notify Python via document.title
  var title = 'SELECT:' + selectedLat + ',' + selectedLng;
  if (document.title !== title) {
    document.title = title;
  }
}

// Map click
map.on('click', function(e) {
  if (marker) map.removeLayer(marker);
  marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
  selectPoint(e.latlng.lat, e.latlng.lng);
});

// Set location
function applyLocation() {
  if (selectedLat === null) return;
  if (bridge) {
    bridge.setLocation(selectedLat, selectedLng);
  }
  document.title = 'SET:' + selectedLat + ',' + selectedLng;
  document.getElementById('hint').textContent = 'Setting location...';
}

// Copy coordinates
function copyCoords() {
  if (selectedLat === null) return;
  var text = selectedLat + ', ' + selectedLng;
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied: ' + text);
  }).catch(function() {
    showToast('Copy failed', true);
  });
}

// Restore
function restoreLocation() {
  if (bridge) {
    bridge.clearLocation();
  }
  document.title = 'CLEAR:now';
  document.getElementById('hint').textContent = 'Restoring real location...';
}

// Search with dropdown results
var AMAP_KEY = localStorage.getItem('AMAP_KEY') || '';
var _searchTimer = null;

function doSearch() {
  var val = document.getElementById('search').value.trim();
  if (!val) { hideDropdown(); return; }
  // Direct coordinate input
  var coordMatch = val.match(/^(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)$/);
  if (coordMatch) {
    var lat = parseFloat(coordMatch[1]), lng = parseFloat(coordMatch[2]);
    map.setView([lat, lng], 15);
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);
    selectPoint(lat, lng);
    hideDropdown();
    return;
  }
  showToast('Searching...');

  if (AMAP_KEY) {
    var amapUrl = 'https://restapi.amap.com/v3/place/text?key=' + AMAP_KEY
      + '&keywords=' + encodeURIComponent(val) + '&output=json&offset=10';
    fetch(amapUrl)
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.pois && data.pois.length > 0){
          showDropdown(data.pois.map(function(poi){
            var loc = poi.location.split(',');
            var city = poi.cityname || poi.adname || '';
            var addr = poi.address || '';
            var subtitle = city + (addr ? ' · ' + addr : '');
            return {name: poi.name, address: subtitle, lat: parseFloat(loc[1]), lng: parseFloat(loc[0])};
          }));
        } else {
          showToast('Not found', true);
          hideDropdown();
        }
      })
      .catch(function(){ showToast('Search failed', true); hideDropdown(); });
    return;
  }

  // Fallback: Nominatim
  var url = 'https://nominatim.openstreetmap.org/search?format=json&q='
    + encodeURIComponent(val) + '&accept-language=zh-CN&limit=8';
  var timeout = new Promise(function(_, rej){ setTimeout(function(){ rej(new Error('timeout')); }, 8000); });
  Promise.race([fetch(url, {headers:{'Accept':'application/json'}}), timeout])
    .then(function(r){return r.json();})
    .then(function(data){
      if(data && data.length > 0){
        showDropdown(data.map(function(item){
          return {name: item.display_name.split(',')[0], address: item.display_name, lat: parseFloat(item.lat), lng: parseFloat(item.lon)};
        }));
      } else {
        showToast('Not found', true);
        hideDropdown();
      }
    })
    .catch(function(){
      showToast('Search failed. Set AMap Key for better results.', true);
      showAmapKeyBar();
      hideDropdown();
    });
}

function showDropdown(results) {
  var dd = document.getElementById('searchDropdown');
  dd.innerHTML = '';
  results.forEach(function(r, i) {
    var item = document.createElement('div');
    item.style.cssText = 'padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.15s';
    item.innerHTML = '<div style="color:#eee;font-size:13px;font-weight:500">' + r.name + '</div>'
      + '<div style="color:#888;font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + r.address + '</div>';
    item.onmouseenter = function(){ this.style.background = 'rgba(0,212,255,0.15)'; };
    item.onmouseleave = function(){ this.style.background = 'transparent'; };
    item.onclick = function() {
      map.setView([r.lat, r.lng], 15);
      if (marker) map.removeLayer(marker);
      marker = L.marker([r.lat, r.lng]).addTo(map).bindPopup(r.name).openPopup();
      selectPoint(r.lat, r.lng);
      hideDropdown();
      document.getElementById('search').value = r.name;
    };
    dd.appendChild(item);
  });
  dd.style.display = 'block';
}

function hideDropdown() {
  document.getElementById('searchDropdown').style.display = 'none';
}

// Hide dropdown when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-bar')) hideDropdown();
});

// Live search on input (debounced)
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(_searchTimer);
  var val = this.value.trim();
  if (val.length < 2) { hideDropdown(); return; }
  _searchTimer = setTimeout(doSearch, 400);
});

document.getElementById('search').addEventListener('keydown',function(e){
  if(e.key==='Enter')doSearch();
});

// AMap key management
function saveAmapKey() {
  var key = document.getElementById('amapKeyInput').value.trim();
  if (key) {
    AMAP_KEY = key;
    localStorage.setItem('AMAP_KEY', key);
    document.getElementById('amapKeyBar').style.display = 'none';
    showToast('AMap Key saved');
  }
}
// Load saved key
if (AMAP_KEY) {
  document.getElementById('amapKeyInput').value = AMAP_KEY;
}
// Show key bar if no key configured and search fails
function showAmapKeyBar() {
  document.getElementById('amapKeyBar').style.display = 'block';
}

function showToast(msg,isError){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(isError?' error':'');
  setTimeout(function(){t.className='toast';},2500);
}

// Called from Python
function updateDeviceInfo(name,version){
  document.getElementById('hint').textContent='Device: '+name+' (iOS '+version+')';
}
function showStatus(msg,isError){
  document.getElementById('hint').textContent=msg;
  showToast(msg,isError);
}
</script>
</body>
</html>
