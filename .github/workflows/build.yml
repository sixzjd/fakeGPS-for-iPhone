name: Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v6.0.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller
      - name: Build macOS app
        run: pyinstaller fakegps.spec --clean -y
      - name: Zip macOS app
        run: cd dist && zip -r FakeGPS-macOS.zip FakeGPS.app
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: dist/FakeGPS-macOS.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeGPS-macOS
          path: dist/FakeGPS-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller
      - name: Verify Python.NET runtime
        shell: pwsh
        run: |
          python -c "import webview, pythonnet, clr_loader; from importlib.metadata import version; print('pywebview', version('pywebview')); print('pythonnet', version('pythonnet')); print('clr-loader', version('clr-loader'))"
          python check_pythonnet_runtime.py
      - name: Build Windows exe
        run: pyinstaller fakegps.spec --clean -y
      - name: Harden Windows PE files
        run: python patch_pe_security.py dist\FakeGPS
      - name: Test packaged Windows startup
        shell: pwsh
        run: .\test_windows_startup.ps1
      - name: Zip Windows build
        run: Compress-Archive -Path dist\FakeGPS\* -DestinationPath dist\FakeGPS-Windows.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: dist/FakeGPS-Windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeGPS-Windows
          path: dist/FakeGPS-Windows.zip
