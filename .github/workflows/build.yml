name: Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v6.0.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller
      - name: Build macOS app
        run: pyinstaller fakegps.spec --clean -y
      - name: Create macOS DMG
        run: |
          mkdir -p dist/dmg-root
          cp -R dist/FakeGPS.app dist/dmg-root/FakeGPS.app
          ln -s /Applications dist/dmg-root/Applications
          hdiutil create -volname FakeGPS -srcfolder dist/dmg-root -ov -format UDZO -o dist/FakeGPS-macOS.dmg
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: dist/FakeGPS-macOS.dmg
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeGPS-macOS
          path: dist/FakeGPS-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller
      - name: Verify Python.NET runtime
        shell: pwsh
        run: |
          python -c "import webview, pythonnet, clr_loader; from importlib.metadata import version; print('pywebview', version('pywebview')); print('pythonnet', version('pythonnet')); print('clr-loader', version('clr-loader'))"
          python check_pythonnet_runtime.py
      - name: Build Windows exe
        run: pyinstaller fakegps.spec --clean -y
      - name: Harden Windows PE files
        run: python patch_pe_security.py dist\FakeGPS
      - name: Test packaged Windows startup
        shell: pwsh
        run: .\test_windows_startup.ps1 -Root (Join-Path $PWD 'dist\FakeGPS')
      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (-not (Get-Command iscc.exe -ErrorAction SilentlyContinue)) {
            choco install innosetup --no-progress -y
          }
      - name: Build Windows installer
        shell: pwsh
        run: iscc.exe FakeGPS.iss
      - name: Test installed Windows startup
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:RUNNER_TEMP 'FakeGPS-installed'
          if (Test-Path $installRoot) { Remove-Item $installRoot -Recurse -Force }
          $installer = (Resolve-Path 'dist\installer\FakeGPS-Windows-Setup.exe').Path
          $result = Start-Process -FilePath $installer -ArgumentList @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/DIR=$installRoot") -Wait -PassThru
          if ($result.ExitCode -ne 0) { throw "Installer failed with exit code $($result.ExitCode)" }
          .\test_windows_startup.ps1 -Root $installRoot
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: dist/installer/FakeGPS-Windows-Setup.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeGPS-Windows
          path: dist/installer/FakeGPS-Windows-Setup.exe

  cleanup-legacy-assets:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Remove legacy archive assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}"
          gh release delete-asset "$tag" FakeGPS-macOS.zip --yes || true
          gh release delete-asset "$tag" FakeGPS-Windows.zip --yes || true
