name: Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v6.0.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pymobiledevice3 pywebview pyinstaller
      - name: Build macOS app
        run: pyinstaller fakegps.spec --clean -y
      - name: Zip macOS app
        run: cd dist && zip -r FakeGPS-macOS.zip FakeGPS.app
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: dist/FakeGPS-macOS.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeGPS-macOS
          path: dist/FakeGPS-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pymobiledevice3 pywebview pyinstaller
      - name: Build Windows exe
        run: pyinstaller fakegps.spec --clean -y
      - name: Zip Windows build
        run: Compress-Archive -Path dist\FakeGPS\* -DestinationPath dist\FakeGPS-Windows.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: dist/FakeGPS-Windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeGPS-Windows
          path: dist/FakeGPS-Windows.zip
